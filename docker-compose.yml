version: '3.8'

services:
  meu-banco:
    image: mysql:8.0
    command: --lower_case_table_names=1
    container_name: meu_mysql_container
    ports:
      - "3308:3306"
    environment: 
      MYSQL_ROOT_PASSWORD: 2005
      MYSQL_DATABASE: LAN_HOUSE
    volumes:
      # USANDO O CAMINHO ABSOLUTO COM BARRAS PARA O LINUX ENTENDER
      - C:/Users/Pedro PC/Desktop/BackEnd/Projetos/Projeto_SGLH/database:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql

volumes:
  db_data: {}